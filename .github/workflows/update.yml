# 放到 .github/workflows/update.yml
name: 更新七期實價登錄

on:
  schedule:
    # ⚠️ GitHub Actions 的 cron 一律吃 UTC，台灣是 UTC+8。
    #    官方每月 1、11、21 日發布，這裡排台灣時間中午 12:00 = UTC 04:00，
    #    留幾小時緩衝避開官方當天早上還沒放檔的空窗。
    - cron: "0 4 1,11,21 * *"
  workflow_dispatch: {}   # 允許在 Actions 頁面手動觸發（第一次灌資料會用到）

permissions:
  contents: write   # 把資料 commit 回 repo
  issues: write     # 失敗時開 issue 通知（少了這個，連報錯都會報錯）

concurrency:
  group: lvr-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # 注意：不要加 cache: pip。那需要 requirements.txt 之類的檔案來算快取鍵，
          # 這個 repo 沒有，setup-python 會直接失敗。裝 pandas 也才十幾秒，不值得。

      - run: pip install pandas requests

      - name: 抓取並彙整
        run: python qiqi_lvr.py

      - name: 提交結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qiqi.db docs/data.json
          # 沒有變動就不 commit，避免產生空提交
          git diff --staged --quiet || git commit -m "資料更新 $(date -u +%Y-%m-%d)"
          git push

      # 失敗會寄 email，但很容易滑掉。開 issue 比較難忽略，
      # 而且 issue 本身算 repo 活動 → 順便避免排程因 60 天無活動被停用
      - name: 失敗就開 issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `實價登錄更新失敗 ${new Date().toISOString().slice(0,10)}`,
              body: `排程抓取失敗，網站將繼續顯示舊資料。\n\n`
                  + `錯誤紀錄：${context.serverUrl}/${context.repo.owner}/`
                  + `${context.repo.repo}/actions/runs/${context.runId}`
            })
